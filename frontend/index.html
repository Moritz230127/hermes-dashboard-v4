<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }
        .app { max-width: 1400px; margin: 0 auto; padding: 16px; }
        .banner {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 24px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #30363d;
        }
        .banner h1 { font-size: 22px; font-weight: 600; color: #58a6ff; }
        .banner .subtitle { font-size: 13px; color: #8b949e; margin-top: 4px; }
        .content { display: grid; grid-template-columns: 320px 1fr; gap: 16px; }
        @media (max-width: 900px) { .content { grid-template-columns: 1fr; } }
        .sidebar { display: flex; flex-direction: column; gap: 12px; }
        .main-area { display: flex; flex-direction: column; gap: 16px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px 14px;
        }
        .stat-value { font-size: 20px; font-weight: 700; color: #f0f6fc; }
        .stat-label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
        .chart-panel, .sessions-table {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
        }
        h3 { font-size: 14px; font-weight: 600; color: #58a6ff; margin-bottom: 12px; }
        .dashboard-chart {
            width: 100%;
            height: 200px;
            background: #0d1117;
            border-radius: 6px;
            margin-bottom: 16px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 8px 10px; border-bottom: 1px solid #30363d; color: #8b949e; font-weight: 500; }
        td { padding: 6px 10px; border-bottom: 1px solid #21262d; }
        tr:hover { background: #1c2128; }
    </style>
</head>
<body>
    <div id="main"></div>
    <script type="module">
        import init from './pkg/dashboard_frontend.js';
        await init();
    </script>
</body>
</html>

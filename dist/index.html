<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent 控制面板 V4</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f0f14; --bg2: #181820; --bg3: #20202a;
  --border: #38384a; --border2: #2e2e3c;
  --text: #ece8e0; --text2: #b0aca5; --text3: #7a7773; --text4: #555350;
  --accent: #6aa8e0; --accent2: #44cc66; --accent3: #f0b830;
  --hover: #242434;
  --card-bg: #15151e;
  --header-bg: linear-gradient(135deg, #141420 0%, #1c1c28 100%);
  --green: #44cc66; --green-bg: #0e2414;
  --yellow: #f0b830; --yellow-bg: #241e10;
  --red: #d06060; --red-bg: #241014;
  --blue: #6aa8e0; --blue-bg: #101e2e;
  --v4: #b388ff;
}
:root[data-theme="light"] {
  --bg: #f0ece4; --bg2: #faf8f4; --bg3: #f4f0ea;
  --border: #d8d4cc; --border2: #ccc8c0;
  --text: #2a2a30; --text2: #60606a; --text3: #908a8c; --text4: #b0acac;
  --accent: #4a6eaa; --accent2: #4a7a4a; --accent3: #b0802a;
  --hover: #e8e4dc; --card-bg: #faf8f4;
  --header-bg: linear-gradient(135deg, #e8e4dc 0%, #faf8f4 100%);
  --green: #3a8a3a; --green-bg: #e8f4e8;
  --yellow: #9a7020; --yellow-bg: #f8f0d8;
  --red: #7a3030; --red-bg: #f4e4e4;
  --blue: #4a6eaa; --blue-bg: #e8ecf4;
  --v4: #7c4dff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
  background: var(--bg); color: var(--text);
  padding: 16px; min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}
.container { max-width: 1500px; margin: 0 auto; }

/* ===== Header ===== */
.header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
}
.header-left h1 {
  font-size: 22px; font-weight: 600; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.header-left .v4-badge {
  font-size: 10px; padding: 2px 6px; border-radius: 4px;
  background: var(--v4); color: #fff; font-weight: 500;
}
.dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: #555; transition: background 0.3s; }
.dot.active { background: #4ade80; box-shadow: 0 0 10px rgba(74,222,128,0.7); animation: blink 1.2s ease-in-out infinite; }
.dot.idle { background: var(--accent3); }
@keyframes blink { 0%,100% { opacity: 1; box-shadow: 0 0 10px rgba(74,222,128,0.7); } 50% { opacity: 0.15; box-shadow: none; } }
.timer { font-size: 12px; color: var(--text4); min-width: 50px; text-align: right; }
.header-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.header-right select, .header-right button {
  background: var(--bg2); color: var(--text2); border: 1px solid var(--border);
  border-radius: 4px; padding: 5px 10px; font-size: 13px; cursor: pointer;
  transition: border-color 0.15s;
}
.header-right select:hover, .header-right button:hover { border-color: var(--text3); }
.header-right .btn-refresh { background: var(--bg2); }
.header-right .btn-theme { min-width: 32px; }

/* ===== Running bar ===== */
.running-bar {
  font-size: 12px; color: var(--accent2); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.running-bar .btn-stop {
  font-size: 10px; padding: 2px 8px; border-radius: 3px;
  background: var(--red); color: #fff; border: none; cursor: pointer;
}
.running-bar .btn-stop:hover { opacity: 0.8; }

/* ===== Banner ===== */
.banner-v4 {
  text-align: center; padding: 16px 24px;
  background: var(--header-bg); border: 1px solid var(--border);
  border-radius: 10px; margin-bottom: 14px;
}
.banner-v4 .bn { font-size: 34px; font-weight: 600; color: var(--accent); line-height: 1.2; }
.banner-v4 .bl { font-size: 14px; color: var(--text2); margin-top: 4px; }
.banner-v4 .bs { font-size: 12px; color: var(--text3); margin-top: 3px; display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }

/* ===== Alerts bar ===== */
.alerts-bar {
  display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px;
}
.alert-item {
  font-size: 11px; padding: 6px 12px; border-radius: 4px; display: flex; gap: 8px;
}
.alert-item.warning { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-bg); }
.alert-item.error { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-bg); }
.alert-item.info { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-bg); }
.alert-item .alv { font-weight: 600; min-width: 40px; }

/* ===== Stats row ===== */
.stats-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px; margin-bottom: 12px;
}
@media (max-width: 1000px) { .stats-row { grid-template-columns: repeat(4, 1fr); } }
@media (max-width: 600px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
.stat-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 14px;
}
.stat-card .label { font-size: 11px; color: var(--text3); letter-spacing: 0.3px; margin-bottom: 6px; }
.stat-card .row-values { display: flex; flex-direction: column; gap: 3px; }
.stat-card .primary { display: flex; align-items: baseline; gap: 3px; }
.stat-card .primary .badge {
  font-size: 9px; padding: 1px 5px; border-radius: 2px;
  background: var(--accent); color: #fff; opacity: 0.7;
}
.stat-card .primary .big-num { font-size: 24px; font-weight: 500; color: var(--text); line-height: 1.2; }
.stat-card .secondary { display: flex; align-items: baseline; gap: 3px; }
.stat-card .secondary .badge-s { font-size: 9px; padding: 1px 5px; border-radius: 2px; background: var(--bg3); color: var(--text3); }
.stat-card .secondary .small-num { font-size: 14px; color: var(--text2); }

/* ===== Perf row ===== */
.perf-row {
  display: grid; grid-template-columns: repeat(6, 1fr);
  gap: 8px; margin-bottom: 14px;
}
@media (max-width: 1000px) { .perf-row { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 600px) { .perf-row { grid-template-columns: repeat(2, 1fr); } }
.perf-card { background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px; padding: 10px 12px; text-align: center; }
.perf-card .pv { font-size: 18px; font-weight: 500; color: var(--text); }
.perf-card .pl { font-size: 10px; color: var(--text3); margin-top: 2px; }

/* ===== Charts ===== */
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
@media (max-width: 1000px) { .charts-row { grid-template-columns: 1fr; } }
.chart-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; height: 300px; position: relative; }
.chart-box canvas { width: 100% !important; height: 250px !important; }
.chart-title { font-size: 12px; color: var(--text2); margin-bottom: 5px; }
.chart-legend { font-size: 10px; color: var(--text3); margin-bottom: 4px; }

/* ===== Pool rotator ===== */
.pool-section { margin-bottom: 14px; }
.pool-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
  gap: 6px;
}
.pool-key-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 4px; text-align: center;
  transition: border-color 0.2s;
}
.pool-key-card:hover { border-color: var(--v4); }
.pool-key-card .pool-key-id { font-size: 9px; color: var(--text4); }
.pool-key-card .pool-key-count { font-size: 16px; font-weight: 700; color: var(--text); }
.pool-key-card .pool-key-label { font-size: 8px; color: var(--text4); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pool-key-card.cooling { border-color: var(--yellow); }
.pool-key-card.cooling .pool-key-count { color: var(--yellow); }

/* ===== Model grid ===== */
.model-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; margin-bottom: 16px; }
.model-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
.model-card:hover { border-color: var(--text3); }
.model-card .mn { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.model-card .ms { display: grid; grid-template-columns: 1fr 1fr; gap: 3px 12px; }
.model-card .ms .mi { display: flex; justify-content: space-between; font-size: 11px; }
.model-card .ms .mi .ml { color: var(--text3); }
.model-card .ms .mi .mv { color: var(--text); font-weight: 500; }

/* ===== Tables ===== */
.table-wrap { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; overflow-x: auto; }
.tw-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 6px; }
.tw-title { font-size: 13px; color: var(--text2); }
.tw-actions { display: flex; gap: 6px; }
.tw-actions button {
  font-size: 10px; padding: 3px 10px; border-radius: 4px;
  border: 1px solid var(--border); background: var(--bg3); color: var(--text2); cursor: pointer;
}
.tw-actions button:hover { border-color: var(--text3); color: var(--text); }
.tw-actions .btn-danger { border-color: var(--red); color: var(--red); }
.tw-actions .btn-danger:hover { background: var(--red-bg); }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border); color: var(--text3); font-size: 11px; white-space: nowrap; }
td { padding: 6px 10px; border-bottom: 1px solid var(--bg3); white-space: nowrap; }
tr:hover td { background: var(--hover); }
.num { text-align: right; font-variant-numeric: tabular-nums; }

/* Section title */
.sect { font-size: 13px; color: var(--text2); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }

/* Footer */
.footer { text-align: center; font-size: 11px; color: var(--text4); padding: 8px 0 4px; }
.loading { text-align: center; padding: 50px; color: var(--text3); font-size: 14px; }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading" id="loading">加载中...</div>
</div>

<script>
const CONFIG = { refreshSec: 30 };
let countdown = CONFIG.refreshSec, countdownTimer = null;
let charts = {}, currentTheme = localStorage.getItem('dashboard-theme') || 'dark';
let isDark = currentTheme !== 'light', currentModel = '__all__', runningSessions = [], cachedData = null;
let autoRefresh = true;

// === Utilities ===
function fn(n) { if (n===undefined||n===null) return '0'; if (n>=1e6) return (n/1e6).toFixed(2)+'M'; if (n>=1e3) return (n/1e3).toFixed(1)+'K'; return ''+n; }
function fc(c) { if (!c||c===0) return '$0'; if (c<0.01) return '<$0.01'; return '$'+c.toFixed(4); }
function fd(s) { if (!s||s<=0) return '-'; const m=Math.floor(s/60), sec=Math.floor(s%60); if(m>=60) return Math.floor(m/60)+'h'+(m%60)+'m'; return m+'m'+sec+'s'; }
function ft(t) { if (t===null||t===undefined) return '-'; return t.toFixed(1); }
function es(s) { if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\\"/g,'&quot;'); }
function et(s) { if(!s) return '-'; return es(s).substring(0,60); }

// === Theme ===
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? '' : 'light');
  const btn = document.getElementById('btnTheme');
  if (btn) btn.textContent = isDark ? '\u2600' : '\u263E';
  localStorage.setItem('dashboard-theme', isDark ? 'dark' : 'light');
  updateChartsTheme();
}
function initTheme() { if (currentTheme === 'light') { isDark = false; document.documentElement.setAttribute('data-theme', 'light'); } }

// === Countdown ===
function updTimer() { const el=document.getElementById('timer'); if(el) el.textContent=(autoRefresh?countdown+'s':'P'); }
function startCD() {
  if (!autoRefresh) { updTimer(); return; }
  countdown = CONFIG.refreshSec; updTimer();
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => { countdown--; updTimer(); if (countdown<=0) { clearInterval(countdownTimer); loadData(); } }, 1000);
}
function toggleAutoRefresh() {
  autoRefresh = !autoRefresh;
  const btn = document.getElementById('btnAR');
  if (btn) btn.textContent = autoRefresh ? '\u25B6' : '\u23F8';
  if (autoRefresh) { countdown = CONFIG.refreshSec; startCD(); } else { if (countdownTimer) clearInterval(countdownTimer); updTimer(); }
}

// === Load ===
function loadData() {
  const mf = currentModel, url = '/api/data?model=' + encodeURIComponent(mf);
  fetch(url).then(r=>r.json())
  .then(data => {
    return Promise.all([
      data,
      fetch('/api/sessions/running').then(r=>r.json()).catch(()=>({sessions:[],count:0}))
    ]);
  })
  .then(([data, running]) => {
    runningSessions = running.sessions || [];
    if (cachedData) {
      smoothUpdate(data);
    } else {
      render(data, running.sessions || [], mf);
    }
    startCD();
  })
  .catch(err => { const ld=document.getElementById('loading'); if(ld) ld.textContent='\u52A0\u8F7D\u5931\u8D25: '+err.message; });
}

// === Smooth update ===
function smoothUpdate(data) {
  const today = data.today || {}, r5h = data.rolling_5h || {}, r24h = data.rolling_24h || {};
  const b10m = data.buckets_10m || {}, hourly = data.hourly || {};
  const sessions = data.sessions || [], ms = data.model_summaries || {};
  const hist = data.historical || {}, db7 = hist.daily_breakdown || {}, d30 = hist.daily_30 || [];
  const alerts = data.alerts || [], pool = data.pool_rotator || {};

  const dot = document.getElementById('dotS');
  if (dot) { dot.className = 'dot ' + (runningSessions.length ? 'active' : 'idle'); }

  updTimer();

  // Running sessions bar
  const rb = document.getElementById('runningBar');
  if (rb) {
    if (runningSessions.length) {
      rb.innerHTML = '\u25B6 \u8FD0\u884C\u4E2D: ' + runningSessions.length + ' \u4E2A\u4F1A\u8BDD' +
        (runningSessions.length <= 3 ? runningSessions.map(s => 
          ' <button class="btn-stop" onclick="stopSession(\''+es(s.id)+'\')">\u2716 '+es(s.title.substring(0,20))+'</button>'
        ).join('') : '');
    } else {
      rb.innerHTML = '\u25CB \u65E0\u8FD0\u884C\u4E2D\u4F1A\u8BDD';
    }
  }

  // Alerts bar
  const ab = document.getElementById('alertsBar');
  if (ab && alerts.length) {
    ab.innerHTML = alerts.map(a => 
      '<div class="alert-item '+es(a.level)+'"><span class="alv">['+es(a.level)+']</span>'+es(a.message)+
      (a.value ? ' <strong>'+a.value.toFixed(1)+'</strong>' : '')+
      (a.threshold ? '/'+a.threshold : '')+'</div>'
    ).join('');
  } else if (ab) { ab.innerHTML = ''; }

  // Stat cards
  const statCardLabels = ['API \u8BF7\u6C42','\u4F1A\u8BDD','\u6D88\u606F','\u5DE5\u5177','\u603B Token','\u7F13\u5B58','\u8D39\u7528'];
  for (const label of statCardLabels) {
    const cards = document.querySelectorAll('.stat-card');
    for (const card of cards) {
      const lbl = card.querySelector('.label');
      if (lbl && lbl.textContent === label) {
        const big = card.querySelector('.big-num');
        const small = card.querySelector('.small-num');
        if (big) big.textContent = fn(today[label === 'API \u8BF7\u6C42' ? 'api_calls' : 
          label === '\u4F1A\u8BDD' ? 'sessions' : label === '\u6D88\u606F' ? 'messages' : label === '\u5DE5\u5177' ? 'tool_calls' :
          label === '\u603B Token' ? 'total_tokens' : label === '\u7F13\u5B58' ? 'cache_read_tokens' : 'est_cost']);
        if (small) small.textContent = fn(r24h[label === 'API \u8BF7\u6C42' ? 'api_calls' : 
          label === '\u4F1A\u8BDD' ? 'sessions' : label === '\u6D88\u606F' ? 'messages' : label === '\u5DE5\u5177' ? 'tool_calls' :
          label === '\u603B Token' ? 'total_tokens' : label === '\u7F13\u5B58' ? 'cache_read_tokens' : 'est_cost']);
        break;
      }
    }
  }

  // Banner
  const bannerNum = document.querySelector('.banner-v4 .bn');
  const bannerSub = document.querySelector('.banner-v4 .bs');
  if (bannerNum) bannerNum.textContent = fn(r5h.api_calls) + ' \u6B21';
  if (bannerSub) bannerSub.innerHTML = 
    '<span>\u231A 5h: '+fn(r5h.api_calls)+'\u6B21 / '+fn(r5h.total_tokens)+'T</span>' +
    '<span>\uD83D\uDCC5 24h: '+fn(r24h.api_calls)+'\u6B21 / '+fn(r24h.total_tokens)+'T</span>' +
    '<span>\uD83D\uDCC6 \u4ECA\u65E5: '+fn(today.api_calls)+'\u6B21</span>';

  // Perf row
  const perfLabels = ['TPS','\u8017\u65F6','LLM/\u4F1A\u8BDD','\u5DE5\u5177\u7387','\u4E0A\u4E0B\u6587','\u5F02\u5E38\u7387'];
  const p = today;
  const perfVals = [ft(p.avg_tps)+' tok/s', fd(p.avg_duration_s), (p.avg_llm_calls_per_session||0).toFixed(1),
    (p.api_calls>0?(p.tool_calls/p.api_calls*100).toFixed(1):'0.0')+'%',
    (p.sessions>0?Math.min(100,p.avg_context_usage/(data.context_window||128000)*100).toFixed(1):'0.0')+'%',
    (p.sessions>0?((p.premature||0)/p.sessions*100).toFixed(1):'0.0')+'%'];
  for (let i=0; i<perfLabels.length; i++) {
    const cards = document.querySelectorAll('.perf-card');
    for (const c of cards) {
      const pl = c.querySelector('.pl');
      if (pl && pl.textContent === perfLabels[i]) {
        const pv = c.querySelector('.pv');
        if (pv) pv.textContent = perfVals[i];
        break;
      }
    }
  }

  // Pool rotator
  if (pool && pool.available && pool.keys && pool.keys.length) {
    const pg = document.getElementById('poolGrid');
    if (pg) {
      pg.innerHTML = pool.keys.map(k => {
        const num = k.label ? k.label.split('-').pop() : '?';
        const cooling = k.is_cooling ? ' cooling' : '';
        return '<div class="pool-key-card'+cooling+'" title="' + es(k.label) + '">' +
          '<div class="pool-key-id">K' + es(num) + '</div>' +
          '<div class="pool-key-count">' + fn(k.request_count) + '</div>' +
          (k.is_cooling ? '<div class="pool-key-label">\u2744\uFE0F</div>' : '') +
          '</div>';
      }).join('');
    }
    const pi = document.getElementById('poolInfo');
    if (pi) pi.textContent = pool.total_keys + ' \u4E2A Key \uFF5C ' + fn(pool.total_requests) + ' \u6B21\u8BF7\u6C42';
  }

  updateChartData('c24a', hourly, b10m);
  updateChartDataToken('c24t', b10m);
  updateChartDaily('c7d', db7);
  updateChartDaily('c30d', d30, true);

  updateSessionsTable(sessions);

  cachedData = data;
}

function updateChartData(id, hourly, b10m) {
  const ch = charts[id]; if (!ch || !ch.data) return;
  const bs = Object.entries(b10m).sort((a,b)=>a[0].localeCompare(b[0]));
  const bApi = bs.map(x=>x[1].api_calls);
  const hm = {}; for (const [h,v] of Object.entries(hourly)) hm[h] = v.api_calls;
  const barD = bs.map(x => hm[x[0]] !== undefined ? hm[x[0]] : null);
  ch.data.datasets[0].data = bApi;
  ch.data.datasets[1].data = barD;
  ch.update('none');
}

function updateChartDataToken(id, b10m) {
  const ch = charts[id]; if (!ch || !ch.data) return;
  const s = Object.entries(b10m).sort((a,b)=>a[0].localeCompare(b[0]));
  ch.data.datasets[0].data = s.map(x=>Math.round(x[1].tokens/1000));
  ch.update('none');
}

function updateChartDaily(id, db, is30 = false) {
  const ch = charts[id]; if (!ch || !ch.data) return;
  if (is30 && (!db || !db.length)) return;
  if (!is30) {
    const order = ['6d_ago','5d_ago','4d_ago','3d_ago','2d_ago','yesterday','today'];
    const items = []; for (const k of order) { if (db[k]) items.push(db[k]); }
    ch.data.datasets[0].data = items.map(x=>x.data.api_calls);
    ch.data.datasets[1].data = items.map(x=>Math.round(x.data.total_tokens/1000));
  } else {
    ch.data.datasets[0].data = db.map(x=>x.data.api_calls);
    ch.data.datasets[1].data = db.map(x=>Math.round(x.data.total_tokens/1000));
  }
  ch.update('none');
}

function updateSessionsTable(sessions) {
  const tb = document.getElementById('stBody');
  if (!tb) return;
  const titleEl = document.getElementById('stTitle');
  if (titleEl) titleEl.textContent = '\u6700\u8FD1\u4F1A\u8BDD ('+sessions.length+')';
  tb.innerHTML = sessions.map(s => {
    const inp = s.input_tokens||0, out = s.output_tokens||0;
    const cache = s.cache_read_tokens||0;
    return '<tr>' +
      '<td>'+es(s.date)+' '+es(s.time)+'</td>' +
      '<td>'+es(s.model)+'</td>' +
      '<td class="num">'+fn(s.api_calls)+'</td>' +
      '<td class="num">'+fn(s.total_tokens||0)+'</td>' +
      '<td class="num">'+fn(inp)+'</td>' +
      '<td class="num">'+fn(out)+'</td>' +
      '<td class="num">'+fn(cache)+'</td>' +
      '<td class="num">'+fc(s.cost)+'</td>' +
      '<td class="num">'+fd(s.duration_s)+'</td>' +
      '<td class="num">'+ft(s.tps)+'</td>' +
      '<td>'+et(s.title||'')+'</td>' +
      '</tr>';
  }).join('');
}

// === Render (first-time) ===
function render(data, running, mf) {
  const app = document.getElementById('app');
  const isAll = mf === '__all__';
  const today = data.today || {}, r5h = data.rolling_5h || {}, r24h = data.rolling_24h || {};
  const hourly = data.hourly || {}, b10m = data.buckets_10m || {};
  const sessions = data.sessions || [], ms = data.model_summaries || {};
  const models = data.models || [], alerts = data.alerts || [];
  const hist = data.historical || {}, db7 = hist.daily_breakdown || {}, d30 = hist.daily_30 || [];
  const pool = data.pool_rotator || {};
  const p = today;

  let html = '';

  // Header
  html += '<div class="header">';
  html += '<div class="header-left"><h1><span class="dot'+(running.length?' active':' idle')+'" id="dotS"></span>Agent \u63A7\u5236\u9762\u677F<span class="v4-badge">V4</span></h1></div>';
  html += '<div class="header-right">';
  html += '<select id="mSel" onchange="chModel()">';
  html += '<option value="__all__" selected>\u5168\u90E8</option>';
  for (const m of models) html += '<option value="'+es(m)+'">'+es(m)+'</option>';
  html += '</select>';
  html += '<button id="btnAR" onclick="toggleAutoRefresh()" title="\u81EA\u52A8\u5237\u65B0">'+(autoRefresh?'\u25B6':'\u23F8')+'</button>';
  html += '<button onclick="mr()" title="\u5237\u65B0">\u21BB</button>';
  html += '<button id="btnTheme" class="btn-theme" onclick="toggleTheme()">'+(isDark?'\u2600':'\u263E')+'</button>';
  html += '<span class="timer" id="timer">'+(autoRefresh?CONFIG.refreshSec+'s':'P')+'</span></div></div>';

  // Running bar
  html += '<div class="running-bar" id="runningBar">';
  if (running.length) {
    html += '\u25B6 \u8FD0\u884C\u4E2D: ' + running.length + ' \u4E2A\u4F1A\u8BDD';
    if (running.length <= 3) {
      html += running.map(s => ' <button class="btn-stop" onclick="stopSession(\''+es(s.id)+'\')">\u2716 '+es(s.title.substring(0,20))+'</button>').join('');
    }
  } else {
    html += '\u25CB \u65E0\u8FD0\u884C\u4E2D\u4F1A\u8BDD';
  }
  html += '</div>';

  // Alerts
  if (alerts.length) {
    html += '<div class="alerts-bar" id="alertsBar">';
    for (const a of alerts) {
      html += '<div class="alert-item '+es(a.level)+'"><span class="alv">['+es(a.level)+']</span>'+es(a.message)+
        (a.value ? ' <strong>'+a.value.toFixed(1)+'</strong>' : '')+
        (a.threshold ? '/'+a.threshold : '')+'</div>';
    }
    html += '</div>';
  } else {
    html += '<div class="alerts-bar" id="alertsBar"></div>';
  }

  // Banner
  html += '<div class="banner-v4">';
  html += '<div class="bn">'+fn(r5h.api_calls)+' \u6B21</div>';
  html += '<div class="bl">\u8FD15h API \u8BF7\u6C42 \uFF5C \u6EDA\u52A8\u7A97\u53E3</div>';
  html += '<div class="bs">' +
    '<span>\u231A 5h: '+fn(r5h.api_calls)+'\u6B21 / '+fn(r5h.total_tokens)+'T</span>' +
    '<span>\uD83D\uDCC5 24h: '+fn(r24h.api_calls)+'\u6B21 / '+fn(r24h.total_tokens)+'T</span>' +
    '<span>\uD83D\uDCC6 \u4ECA\u65E5: '+fn(today.api_calls)+'\u6B21</span></div></div>';

  // Stats cards
  const cards = [
    {k:'api_calls',l:'API \u8BF7\u6C42'},{k:'sessions',l:'\u4F1A\u8BDD'},{k:'messages',l:'\u6D88\u606F'},{k:'tool_calls',l:'\u5DE5\u5177'},
    {k:'total_tokens',l:'\u603B Token'},{k:'cache_read_tokens',l:'\u7F13\u5B58'},{k:'est_cost',l:'\u8D39\u7528'}
  ];
  html += '<div class="stats-row">';
  for (const c of cards) {
    html += '<div class="stat-card"><div class="label">'+c.l+'</div><div class="row-values">';
    html += '<div class="primary"><span class="badge">\u4ECA</span><span class="big-num">'+fn(today[c.k])+'</span></div>';
    html += '<div class="secondary"><span class="badge-s">24h</span><span class="small-num">'+fn(r24h[c.k])+'</span></div></div></div>';
  }
  html += '</div>';

  // Perf row
  const tRate = p.api_calls>0 ? (p.tool_calls/p.api_calls*100).toFixed(1) : '0.0';
  const ctxSat = p.sessions>0 ? Math.min(100,p.avg_context_usage/(data.context_window||128000)*100).toFixed(1) : '0.0';
  const pRate = p.sessions>0 ? ((p.premature||0)/p.sessions*100).toFixed(1) : '0.0';
  html += '<div class="perf-row">';
  html += '<div class="perf-card"><div class="pv">'+ft(p.avg_tps)+' tok/s</div><div class="pl">TPS</div></div>';
  html += '<div class="perf-card"><div class="pv">'+fd(p.avg_duration_s)+'</div><div class="pl">\u8017\u65F6</div></div>';
  html += '<div class="perf-card"><div class="pv">'+(p.avg_llm_calls_per_session||0).toFixed(1)+'</div><div class="pl">LLM/\u4F1A\u8BDD</div></div>';
  html += '<div class="perf-card"><div class="pv">'+tRate+'%</div><div class="pl">\u5DE5\u5177\u7387</div></div>';
  html += '<div class="perf-card"><div class="pv">'+ctxSat+'%</div><div class="pl">\u4E0A\u4E0B\u6587</div></div>';
  html += '<div class="perf-card"><div class="pv">'+pRate+'%</div><div class="pl">\u5F02\u5E38\u7387</div></div></div>';

  // Pool Rotator section
  if (pool && pool.available && pool.keys && pool.keys.length) {
    html += '<div class="pool-section">';
    html += '<div class="sect">API Key \u7EDF\u8BA1 <span style="font-size:10px;color:var(--text4)" id="poolInfo">'+pool.total_keys+' \u4E2A Key \uFF5C '+fn(pool.total_requests)+' \u6B21\u8BF7\u6C42</span></div>';
    html += '<div class="pool-grid" id="poolGrid">';
    for (const k of pool.keys) {
      const num = k.label ? k.label.split('-').pop() : '?';
      const cooling = k.is_cooling ? ' cooling' : '';
      html += '<div class="pool-key-card'+cooling+'" title="'+es(k.label)+'">';
      html += '<div class="pool-key-id">K'+es(num)+'</div>';
      html += '<div class="pool-key-count">'+fn(k.request_count)+'</div>';
      if (k.is_cooling) html += '<div class="pool-key-label">\u2744\uFE0F</div>';
      html += '</div>';
    }
    html += '</div></div>';
  }

  // Charts row 1
  html += '<div class="charts-row">';
  html += '<div class="chart-box"><div class="chart-title">24h API \u8BF7\u6C42</div><div class="chart-legend">\u67F1\u72B6=\u6BCF\u5C0F\u65F6 \uFF5C \u66F2\u7EBF=10min \u5B9E\u65F6</div><canvas id="c24a"></canvas></div>';
  html += '<div class="chart-box"><div class="chart-title">24h Token</div><div class="chart-legend">10min \u7C92\u5EA6\u66F2\u7EBF\uFF0C\u65E0\u6807\u8BB0\u70B9</div><canvas id="c24t"></canvas></div></div>';

  // Charts row 2
  html += '<div class="charts-row">';
  html += '<div class="chart-box"><div class="chart-title">\u8FD1 7 \u5929</div><div class="chart-legend">\u67F1=API \u8BF7\u6C42 \uFF5C \u66F2\u7EBF=Token</div><canvas id="c7d"></canvas></div>';
  html += '<div class="chart-box"><div class="chart-title">\u8FD1 30 \u5929</div><div class="chart-legend">\u67F1=API \u8BF7\u6C42 \uFF5C \u66F2\u7EBF=Token</div><canvas id="c30d"></canvas></div></div>';

  // Models
  const me = Object.entries(ms);
  if (me.length) {
    html += '<div class="sect">\u6A21\u578B\u7EDF\u8BA1 ('+me.length+')</div><div class="model-grid">';
    for (const [n, md] of me) {
      html += '<div class="model-card"><div class="mn" title="'+es(n)+'">'+es(n)+'</div><div class="ms">';
      html += '<div class="mi"><span class="ml">\u4F1A\u8BDD</span><span class="mv">'+md.sessions+'</span></div>';
      html += '<div class="mi"><span class="ml">API</span><span class="mv">'+fn(md.api_calls)+'</span></div>';
      html += '<div class="mi"><span class="ml">\u8F93\u5165</span><span class="mv">'+fn(md.input_tokens)+'</span></div>';
      html += '<div class="mi"><span class="ml">\u8F93\u51FA</span><span class="mv">'+fn(md.output_tokens)+'</span></div>';
      html += '<div class="mi"><span class="ml">\u7F13\u5B58</span><span class="mv">'+fn(md.cache_read_tokens)+'</span></div>';
      html += '<div class="mi"><span class="ml">\u603BToken</span><span class="mv">'+fn(md.total_tokens)+'</span></div>';
      html += '<div class="mi"><span class="ml">\u63A8\u7406</span><span class="mv">'+fn(md.reasoning_tokens||0)+'</span></div>';
      html += '<div class="mi"><span class="ml">\u7F13\u5199</span><span class="mv">'+fn(md.cache_write_tokens||0)+'</span></div></div></div>';
    }
    html += '</div>';
  }

  // Sessions table
  html += '<div class="table-wrap"><div class="tw-header"><span class="tw-title" id="stTitle">\u6700\u8FD1\u4F1A\u8BDD ('+sessions.length+')</span>';
  html += '<div class="tw-actions">';
  html += '<button onclick="cleanupMemory()" title="\u6E05\u74067\u5929\u524D\u7684\u5DF2\u7ED3\u675F\u4F1A\u8BDD">\uD83D\uDDD1\uFE0F \u6E05\u7406\u5185\u5B58</button>';
  html += '</div></div>';
  html += '<table><thead><tr>';
  html += '<th>\u65F6\u95F4</th><th>\u6A21\u578B</th><th class="num">API</th><th class="num">\u603BT</th><th class="num">\u8F93\u5165</th><th class="num">\u8F93\u51FA</th><th class="num">\u7F13\u5B58</th><th class="num">\u8D39\u7528</th><th class="num">\u8017\u65F6</th><th class="num">TPS</th><th>\u5185\u5BB9</th>';
  html += '</tr></thead><tbody id="stBody">';
  for (const s of sessions) {
    const inp = s.input_tokens||0, out = s.output_tokens||0;
    const cache = s.cache_read_tokens||0;
    html += '<tr>';
    html += '<td>'+(s.date||'')+' '+(s.time||'')+'</td><td>'+es(s.model)+'</td>';
    html += '<td class="num">'+fn(s.api_calls)+'</td>';
    html += '<td class="num">'+fn(s.total_tokens||0)+'</td>';
    html += '<td class="num">'+fn(inp)+'</td>';
    html += '<td class="num">'+fn(out)+'</td>';
    html += '<td class="num">'+fn(cache)+'</td>';
    html += '<td class="num">'+fc(s.cost)+'</td>';
    html += '<td class="num">'+fd(s.duration_s)+'</td>';
    html += '<td class="num">'+ft(s.tps)+'</td>';
    html += '<td>'+et(s.title||'')+'</td></tr>';
  }
  html += '</tbody></table></div>';

  // Footer
  const now = new Date();
  html += '<div class="footer">';
  html += 'Hermes Dashboard V4 \uFF5C ' + now.toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'});
  if (alerts.length) html += ' \uFF5C \u26A0 '+alerts.length;
  html += '</div>';

  app.innerHTML = html;

  createChart24a(hourly, b10m);
  createChart24t(b10m);
  createChart7d(db7);
  createChart30d(d30);
  cachedData = data;
}

// ===== Chart creation =====
function createChart24a(hourly, b10m) {
  const bs = Object.entries(b10m).sort((a,b)=>a[0].localeCompare(b[0]));
  const labs = bs.map(x=>x[0]), bApi = bs.map(x=>x[1].api_calls);
  const hm = {}; for (const [h,v] of Object.entries(hourly)) hm[h] = v.api_calls;
  const barD = labs.map(l => hm[l] !== undefined ? hm[l] : null);
  const ctx = document.getElementById('c24a'); if (!ctx) return;
  charts['c24a'] = new Chart(ctx, {
    type: 'bar',
    data: { labels: labs, datasets: [
      { label:'\u5B9E\u65F6 (10min)', data:bApi, type:'line', borderColor:'#6aa8e0', backgroundColor:'rgba(106,168,224,0.12)', fill:true, tension:0.25, pointRadius:0, borderWidth:1.5, order:1, yAxisID:'y' },
      { label:'\u6BCF\u5C0F\u65F6', data:barD, backgroundColor:'rgba(106,168,224,0.35)', borderRadius:2, barPercentage:6, categoryPercentage:0.85, order:2, yAxisID:'y' }
    ]},
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: false,
      plugins: { legend: { labels: { color:'#aaa', boxWidth:10, padding:6, font:{size:10} } } },
      scales: {
        y: { beginAtZero: true, ticks:{color:'#888',font:{size:10}}, grid:{color:isDark?'#2a2a36':'#e6e2dc'}, title:{display:true,text:'API',color:'#888',font:{size:10}} },
        x: { ticks:{color:'#888',font:{size:8},maxRotation:45,autoSkip:true,maxTicksLimit:12} }
      }
    }
  });
}

function createChart24t(b10m) {
  const s = Object.entries(b10m).sort((a,b)=>a[0].localeCompare(b[0]));
  const labs = s.map(x=>x[0]), tok = s.map(x=>Math.round(x[1].tokens/1000));
  const ctx = document.getElementById('c24t'); if (!ctx) return;
  charts['c24t'] = new Chart(ctx, {
    type: 'line',
    data: { labels: labs, datasets: [{ label:'Token (\u00F71K)', data:tok, borderColor:'#44cc66', backgroundColor:'rgba(68,204,102,0.08)', fill:true, tension:0.3, pointRadius:0, borderWidth:1.5 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: false,
      plugins: { legend: { labels: { color:'#aaa', boxWidth:10, padding:6, font:{size:10} } } },
      scales: {
        y: { beginAtZero: true, ticks:{color:'#888',font:{size:10}}, grid:{color:isDark?'#2a2a36':'#e6e2dc'}, title:{display:true,text:'T\u00D71K',color:'#888',font:{size:10}} },
        x: { ticks:{color:'#888',font:{size:8},maxRotation:45,autoSkip:true,maxTicksLimit:12} }
      }
    }
  });
}

function createChart7d(db7) {
  const order = ['6d_ago','5d_ago','4d_ago','3d_ago','2d_ago','yesterday','today'];
  const items = []; for (const k of order) { if (db7[k]) items.push(db7[k]); }
  const labs = items.map(x=>x.date), api = items.map(x=>x.data.api_calls), tok = items.map(x=>Math.round(x.data.total_tokens/1000));
  const ctx = document.getElementById('c7d'); if (!ctx) return;
  charts['c7d'] = new Chart(ctx, {
    type: 'bar',
    data: { labels: labs, datasets: [
      { label:'API', data:api, backgroundColor:'rgba(106,168,224,0.45)', borderRadius:2, barPercentage:0.5, order:2, yAxisID:'y' },
      { label:'Token(\u00F71K)', data:tok, type:'line', borderColor:'#44cc66', backgroundColor:'transparent', tension:0.3, pointRadius:2, borderWidth:1.5, order:1, yAxisID:'y1' }
    ]},
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: false,
      plugins: { legend: { labels: { color:'#aaa', boxWidth:10, padding:6, font:{size:10} } } },
      scales: {
        y: { beginAtZero: true, ticks:{color:'#888',font:{size:10}}, grid:{color:isDark?'#2a2a36':'#e6e2dc'}, title:{display:true,text:'API',color:'#888',font:{size:10}} },
        y1: { position:'right', beginAtZero: true, ticks:{color:'#888',font:{size:10}}, grid:{display:false}, title:{display:true,text:'T\u00D71K',color:'#888',font:{size:10}} },
        x: { ticks:{color:'#888',font:{size:9}} }
      }
    }
  });
}

function createChart30d(d30) {
  if (!d30||!d30.length) { const e=document.getElementById('c30d'); if(e){const p=e.parentElement; p.innerHTML='<div class="chart-title">\u8FD1 30 \u5929</div><div class="chart-legend">\u65E0\u6570\u636E</div>';} return; }
  const labs = d30.map(x=>x.date), api = d30.map(x=>x.data.api_calls), tok = d30.map(x=>Math.round(x.data.total_tokens/1000));
  const ctx = document.getElementById('c30d'); if (!ctx) return;
  charts['c30d'] = new Chart(ctx, {
    type: 'bar',
    data: { labels: labs, datasets: [
      { label:'API', data:api, backgroundColor:'rgba(106,168,224,0.35)', borderRadius:1, barPercentage:0.4, order:2, yAxisID:'y' },
      { label:'Token(\u00F71K)', data:tok, type:'line', borderColor:'#44cc66', backgroundColor:'transparent', tension:0.3, pointRadius:1, borderWidth:1, order:1, yAxisID:'y1' }
    ]},
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: false,
      plugins: { legend: { labels: { color:'#aaa', boxWidth:10, padding:6, font:{size:9} } } },
      scales: {
        y: { beginAtZero: true, ticks:{color:'#888',font:{size:9}}, grid:{color:isDark?'#2a2a36':'#e6e2dc'}, title:{display:true,text:'API',color:'#888',font:{size:9}} },
        y1: { position:'right', beginAtZero: true, ticks:{color:'#888',font:{size:9}}, grid:{display:false}, title:{display:true,text:'T\u00D71K',color:'#888',font:{size:9}} },
        x: { ticks:{color:'#888',font:{size:7},maxRotation:45,autoSkip:true,maxTicksLimit:15} }
      }
    }
  });
}

function updateChartsTheme() {
  const gc = isDark ? '#2a2a36' : '#e6e2dc';
  for (const k of Object.keys(charts)) { const ch=charts[k]; if(ch) { ch.options.scales.y.grid.color = gc; ch.update(); } }
}

// === Actions ===
function chModel() { currentModel=document.getElementById('mSel').value; if(countdownTimer)clearInterval(countdownTimer); cachedData=null; loadData(); }
function mr() { if(countdownTimer)clearInterval(countdownTimer); loadData(); }

// === Stop session ===
function stopSession(sid) {
  if (!confirm('\u786E\u5B9A\u8981\u505C\u6B62\u4F1A\u8BDD: '+sid.substring(0,12)+'...?')) return;
  fetch('/api/sessions/stop/'+encodeURIComponent(sid), {method:'POST'})
    .then(r=>r.json()).then(()=>{ cachedData=null; loadData(); })
    .catch(e=>alert('\u505C\u6B62\u5931\u8D25: '+e.message));
}

// === Memory cleanup ===
function cleanupMemory() {
  if (!confirm('\u786E\u5B9A\u8981\u6E05\u7406\u6240\u67097\u5929\u524D\u7684\u5DF2\u7ED3\u675F\u4F1A\u8BDD\uFF1F\u6B64\u64CD\u4F5C\u4E0D\u53EF\u64A4\u9500\u3002')) return;
  fetch('/api/memory/cleanup', {method:'POST'})
    .then(r=>r.json()).then(d => {
      alert('\u6E05\u7406\u5B8C\u6210: '+d.message);
      cachedData=null; loadData();
    })
    .catch(e=>alert('\u6E05\u7406\u5931\u8D25: '+e.message));
}

initTheme();
loadData();
</script>
</body>
</html>
